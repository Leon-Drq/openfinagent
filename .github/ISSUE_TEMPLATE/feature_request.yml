name: Feature request
description: Suggest a new capability, workflow, or runtime improvement.
title: "feat: <one-line summary>"
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the user need or workflow gap. We optimize for problems first,
        solutions second — even a sentence helps.
      placeholder: e.g. I want to run earnings-deep-dive across a basket of tickers in one command.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have an idea, sketch it here. APIs, CLI flags, YAML shape — anything.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought about solving this, including doing nothing.
    validations:
      required: false

  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this touch?
      multiple: true
      options:
        - CLI
        - Python API
        - Workflow DSL
        - Provider protocol
        - MCP server
        - Web UI (future)
        - Documentation
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the project's [Code of Conduct](../../CODE_OF_CONDUCT.md).
          required: true
