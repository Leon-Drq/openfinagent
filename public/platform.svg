<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img"
     aria-label="Platform diagram: capability universe, orchestration core, agents, skills, and surfaces">
  <defs>
    <style><![CDATA[
      :root {
        --bg: #fbfaf6;
        --card: #ffffff;
        --fg: #1a1f1c;
        --muted: #6b6f6b;
        --primary: #1f6f4a;
        --primary-fg: #fbfaf6;
        --accent: #c8842a;
        --border: #e3e0d6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1311;
          --card: #131a17;
          --fg: #e9eae6;
          --muted: #8b8f8b;
          --primary: #4ec48c;
          --primary-fg: #0a0f0d;
          --accent: #ecb66a;
          --border: #232b27;
        }
      }
      .bg          { fill: var(--card); }
      .lbl-tier    { font: 600 11px ui-monospace, "SF Mono", Menlo, monospace; letter-spacing: .12em; text-transform: uppercase; fill: var(--muted); }
      .lbl-chip    { font: 600 13px Inter, system-ui, sans-serif; fill: var(--fg); }
      .lbl-note    { font: 500 10px ui-monospace, monospace; fill: var(--muted); letter-spacing: .04em; }
      .lbl-core    { font: 700 14px Inter, system-ui, sans-serif; fill: var(--primary-fg); letter-spacing: .04em; text-transform: uppercase; }
      .lbl-stage   { font: 600 15px Inter, system-ui, sans-serif; fill: var(--primary-fg); }
      .lbl-stage-n { font: 400 11px ui-monospace, monospace; fill: var(--primary-fg); fill-opacity: .7; }
      .lbl-pop-t   { font: 700 11px ui-monospace, monospace; letter-spacing: .14em; text-transform: uppercase; fill: var(--accent); }
      .lbl-pop     { font: 500 11px Inter, system-ui, sans-serif; fill: var(--fg); }
      .lbl-foot    { font: 400 10px ui-monospace, monospace; letter-spacing: .18em; fill: var(--primary-fg); fill-opacity: .75; }

      .chip        { fill: var(--card); stroke: var(--border); stroke-width: 1; }
      .chip-amber  { fill: var(--card); stroke: var(--accent); stroke-width: 1; stroke-opacity: .55; }
      .chip-emer   { fill: var(--card); stroke: var(--primary); stroke-width: 1; stroke-opacity: .45; }
      .chip-amber-tint { fill: var(--accent); fill-opacity: .08; }
      .chip-emer-tint  { fill: var(--primary); fill-opacity: .06; }

      .flow {
        stroke: var(--primary); stroke-opacity: .55;
        stroke-width: 1.25; fill: none;
        stroke-dasharray: 4 6;
        animation: dash 1.6s linear infinite;
      }
      @keyframes dash { to { stroke-dashoffset: -20; } }

      .core      { fill: var(--primary); }
      .core-glow {
        fill: none; stroke: var(--primary); stroke-width: 2; opacity: .35;
        animation: glow 2.6s ease-in-out infinite;
        transform-origin: 600px 435px;
      }
      @keyframes glow {
        0%, 100% { opacity: .15; }
        50%      { opacity: .55; }
      }

      .stage-row { cursor: pointer; }
      .stage-hl {
        fill: var(--accent); opacity: 0;
        animation: stage-cycle 4.8s ease-in-out infinite;
      }
      .stage-1 { animation-delay: 0s; }
      .stage-2 { animation-delay: 1.6s; }
      .stage-3 { animation-delay: 3.2s; }
      @keyframes stage-cycle {
        0%, 25%   { opacity: 0; }
        8%, 17%   { opacity: 1; }
        33%, 100% { opacity: 0; }
      }

      .stage-pop { opacity: 0; pointer-events: none; transition: opacity .2s ease; }
      .stage-row:hover .stage-pop { opacity: 1; }
      .stage-row:hover .stage-hl  { opacity: 1; animation: none; }

      .core-line { stroke: var(--primary-fg); stroke-opacity: .25; stroke-width: 1; }
      .stage-conn { stroke: var(--primary-fg); stroke-opacity: .35; stroke-width: 1; stroke-dasharray: 2 3; }

      .badge-bg     { fill: var(--primary-fg); fill-opacity: .12; stroke: var(--primary-fg); stroke-opacity: .35; stroke-width: 1; }
      .badge-text   { font: 600 11px ui-monospace, monospace; fill: var(--primary-fg); }

      .dot-amber { fill: var(--accent); }
      .dot-emer  { fill: var(--primary); }

      .pop-bg   { fill: var(--card); stroke: var(--accent); stroke-width: 1.25; }
      .pop-conn { stroke: var(--accent); stroke-width: 1; stroke-opacity: .6; }
    ]]></style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--primary)" fill-opacity=".55"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="820"/>

  <!-- ============== TOP TIER : Capability Universe ============== -->
  <text class="lbl-tier" x="600" y="28" text-anchor="middle">Capability Universe — powered by QVeris . 10,000+ verified tools</text>

  <!-- chips: x positions 30, 224, 418, 612, 806, 1000 ; y=56 ; w=170 ; h=56 -->
  <g>
    <rect class="chip-amber-tint" x="30"   y="56" width="170" height="56" rx="10"/>
    <rect class="chip-amber"      x="30"   y="56" width="170" height="56" rx="10"/>
    <text class="lbl-chip" x="46"  y="80">Market Data</text>
    <text class="lbl-note" x="46"  y="98">OHLCV . L1/L2</text>
    <circle class="dot-amber" cx="186" cy="70" r="3"/>
  </g>
  <g>
    <rect class="chip-amber-tint" x="224"  y="56" width="170" height="56" rx="10"/>
    <rect class="chip-amber"      x="224"  y="56" width="170" height="56" rx="10"/>
    <text class="lbl-chip" x="240" y="80">Filings</text>
    <text class="lbl-note" x="240" y="98">10-K . 10-Q . 8-K</text>
    <circle class="dot-amber" cx="380" cy="70" r="3"/>
  </g>
  <g>
    <rect class="chip-amber-tint" x="418"  y="56" width="170" height="56" rx="10"/>
    <rect class="chip-amber"      x="418"  y="56" width="170" height="56" rx="10"/>
    <text class="lbl-chip" x="434" y="80">News</text>
    <text class="lbl-note" x="434" y="98">wires . sentiment</text>
    <circle class="dot-amber" cx="574" cy="70" r="3"/>
  </g>
  <g>
    <rect class="chip-amber-tint" x="612"  y="56" width="170" height="56" rx="10"/>
    <rect class="chip-amber"      x="612"  y="56" width="170" height="56" rx="10"/>
    <text class="lbl-chip" x="628" y="80">Macro</text>
    <text class="lbl-note" x="628" y="98">FRED . BLS . IMF</text>
    <circle class="dot-amber" cx="768" cy="70" r="3"/>
  </g>
  <g>
    <rect class="chip-amber-tint" x="806"  y="56" width="170" height="56" rx="10"/>
    <rect class="chip-amber"      x="806"  y="56" width="170" height="56" rx="10"/>
    <text class="lbl-chip" x="822" y="80">Crypto</text>
    <text class="lbl-note" x="822" y="98">spot . onchain</text>
    <circle class="dot-amber" cx="962" cy="70" r="3"/>
  </g>
  <g>
    <rect class="chip-amber-tint" x="1000" y="56" width="170" height="56" rx="10"/>
    <rect class="chip-amber"      x="1000" y="56" width="170" height="56" rx="10"/>
    <text class="lbl-chip" x="1016" y="80">Alt Data</text>
    <text class="lbl-note" x="1016" y="98">ESG . satellite</text>
    <circle class="dot-amber" cx="1156" cy="70" r="3"/>
  </g>

  <!-- vertical drops + horizontal bus + drop into core -->
  <line class="flow" x1="115"  y1="112" x2="115"  y2="180"/>
  <line class="flow" x1="309"  y1="112" x2="309"  y2="180"/>
  <line class="flow" x1="503"  y1="112" x2="503"  y2="180"/>
  <line class="flow" x1="697"  y1="112" x2="697"  y2="180"/>
  <line class="flow" x1="891"  y1="112" x2="891"  y2="180"/>
  <line class="flow" x1="1085" y1="112" x2="1085" y2="180"/>
  <line class="flow" x1="115"  y1="180" x2="1085" y2="180"/>
  <line class="flow" x1="600"  y1="180" x2="600"  y2="270" marker-end="url(#arrow)"/>

  <!-- traveling dots on bus -->
  <circle class="dot-amber" r="3.5">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M 115 180 L 1085 180"/>
  </circle>
  <circle class="dot-amber" r="3.5">
    <animateMotion dur="3.2s" begin="1.6s" repeatCount="indefinite" path="M 1085 180 L 115 180"/>
  </circle>
  <circle class="dot-emer" r="3.5">
    <animateMotion dur="1.6s" repeatCount="indefinite" path="M 600 180 L 600 270"/>
  </circle>

  <!-- ============== MIDDLE : Agents (left), Skills (right), Core (center) ============== -->

