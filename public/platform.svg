  <line class="core-line" x1="364" y1="316" x2="836" y2="316"/>

  <!-- Stage 01 : DISCOVER -->
  <g class="stage-row">
    <rect x="356" y="328" width="488" height="64" fill="transparent"/>
    <rect class="stage-hl stage-1" x="362" y="332" width="4" height="56" rx="2"/>
    <circle class="badge-bg" cx="390" cy="358" r="14"/>
    <text class="badge-text" x="390" y="362" text-anchor="middle">01</text>
    <text class="lbl-stage"   x="418" y="356">DISCOVER</text>
    <text class="lbl-stage-n" x="418" y="376">find capabilities . semantic match</text>
    <line class="stage-conn" x1="390" y1="374" x2="390" y2="410"/>

    <g class="stage-pop">
      <line class="pop-conn" x1="620" y1="358" x2="626" y2="358"/>
      <rect class="pop-bg" x="626" y="322" width="218" height="88" rx="8"/>
      <text class="lbl-pop-t" x="640" y="340">DISCOVER DETAILS</text>
      <text class="lbl-pop"   x="640" y="358">. Semantic search across 10,000+ tools</text>
      <text class="lbl-pop"   x="640" y="374">. Auto-rank by recency, coverage, cost</text>
      <text class="lbl-pop"   x="640" y="390">. No hard-coded API list to maintain</text>
    </g>
  </g>

  <!-- Stage 02 : INSPECT -->
