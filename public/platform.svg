  </circle>
  <circle class="dot-emer" r="3.5">
    <animateMotion dur="3.6s" begin="1.2s" repeatCount="indefinite" path="M 600 600 L 600 698 L 1032 698"/>
  </circle>
  <circle class="dot-emer" r="3.5">
