    <line class="flow" x1="280" y1="530" x2="340" y2="530" marker-end="url(#arrow)"/>
    <circle class="dot-emer" r="3">
      <animateMotion dur="2.8s" begin="1.2s" repeatCount="indefinite" path="M 280 530 L 340 530"/>
    </circle>
