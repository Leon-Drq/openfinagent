      <rect class="pop-bg" x="626" y="400" width="218" height="88" rx="8"/>
      <text class="lbl-pop-t" x="640" y="418">INSPECT DETAILS</text>
      <text class="lbl-pop"   x="640" y="436">. Pre-flight cost &amp; rate-limit check</text>
      <text class="lbl-pop"   x="640" y="452">. Type-safe schema for inputs/outputs</text>
      <text class="lbl-pop"   x="640" y="468">. Permission scope before any call</text>
